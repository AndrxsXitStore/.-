    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Fondo animado */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            background: radial-gradient(circle at 50% 50%, #050818 0%, #000005 100%);
        }
        .grid-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            background-image: 
                linear-gradient(rgba(0,200,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,255,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }

        /* Glassmorphism */
        .glass {
            background: rgba(8, 10, 20, 0.65);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(0, 240, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 240, 255, 0.1);
        }

        /* Bordes neón */
        .neon-border {
            position: relative;
            overflow: hidden;
        }
        .neon-border::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 300%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #00f0ff, #9933ff, #00f0ff, transparent);
            animation: neonFlow 6s linear infinite;
        }
        .neon-border::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: inherit;
            border-radius: inherit;
            z-index: 1;
        }
        @keyframes neonFlow {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Texto brillante */
        .text-metallic {
            background: linear-gradient(180deg, #ffffff 0%, #e0f7ff 30%, #80d8ff 60%, #ffffff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 6px rgba(0,240,255,0.6));
        }

        /* Tarjetas */
        .card-3d {
            transition: all 0.5s ease;
        }
        .card-3d:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(0,240,255,0.4), 0 0 60px rgba(153,51,255,0.2);
        }

        /* Botones */
        .btn-premium {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 2;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0,240,255,0.5);
        }

        /* Pantalla de carga */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #000005;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .progress-bar {
            width: 280px;
            height: 4px;
            background: rgba(0,240,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 2rem;
        }
        .progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00f0ff, #9933ff);
            animation: loadProgress 2.5s ease-out forwards;
        }
        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 5, 0.85);
            backdrop-filter: blur(8px);
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            width: 90%;
            max-width: 420px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal.active .modal-content {
            transform: scale(1);
        }
        .option {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .option:hover {
            transform: translateX(5px);
            border-color: #00f0ff;
            box-shadow: 0 0 15px rgba(0,240,255,0.3);
        }

        .content-layer {
            position: relative;
            z-index: 10;
        }
    </style>
</head>

                    <button class="btn-premium wave-effect open-category-modal block w-full text-center py-2 rounded-lg border border-neonCyan/40 text-neonCyan font-bold" 
                        data-product="Prime Hook"

    <!-- JavaScript COMPLETO -->
    <script>
        // Quitar pantalla de carga
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 2800);
        });

        // Inicializar partículas
        particlesJS("particles-js", {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: "#00f0ff" },
                shape: { type: "circle" },
                opacity: { value: 0.5, random: false },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 150, color: "#00f0ff", opacity: 0.4, width: 1 },
                move: { enable: true, speed: 2, direction: "none", random: false, straight: false, out_mode: "out" }
            },
            interactivity: {
                detect_on: "canvas",
                events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" }, resize: true },
                modes: { repulse: { distance: 100, duration: 0.4 } }
            },
            retina_detect: true
        });

        // Lógica del Modal
        const modal = document.getElementById('mainModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const closeModal = document.getElementById('closeModal');

        // Abrir modal y mostrar categorías
        document.querySelectorAll('.open-category-modal').forEach(btn => {
            btn.addEventListener('click', () => {
                const product = btn.dataset.product;
                const categories = JSON.parse(btn.dataset.categories);

                modalTitle.textContent = `Selecciona para ${product}`;
                modalContent.innerHTML = '';

                categories.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'option glass p-3 rounded-lg border border-neonCyan/20';
                    div.textContent = cat.name;
                    div.onclick = () => showDurations(cat.name, cat.durations);
                    modalContent.appendChild(div);
                });

                modal.classList.add('active');
            });
        });

        // Mostrar duraciones después de elegir categoría
        function showDurations(categoryName, durations) {
            modalTitle.textContent = `Duración - ${categoryName}`;
            modalContent.innerHTML = '';

            durations.forEach(dur => {
                const div = document.createElement('div');
                div.className = 'option glass p-3 rounded-lg border border-neonCyan/20 flex justify-between items-center';
                div.innerHTML = `<span>${dur.label}</span> <i class="fa fa-whatsapp text-green-400"></i>`;
                div.onclick = () => window.open(dur.url, '_blank');
                modalContent.appendChild(div);
            });

            // Botón volver atrás
            const backBtn = document.createElement('div');
            backBtn.className = 'option glass p-3 rounded-lg border border-red-400/30 text-center text-red-300 mt-3';
            backBtn.textContent = '⬅ Volver atrás';
            backBtn.onclick = () => document.querySelector('.open-category-modal').click();
            modalContent.appendChild(backBtn);
        }

        // Cerrar modal
        closeModal.addEventListener('click', () => modal.classList.remove('active'));
        window.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });
    </script>

</body>
